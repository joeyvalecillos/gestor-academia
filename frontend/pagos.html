<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar pago</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">

    <a href="index.html" class="volver">← Volver al panel</a>

    <h1>Registrar pago</h1>
    <p id="mensaje"></p>
	
	<p style="font-size: 0.9em; color: #666;">
			Puedes consultar el ID del alumno en la sección "Gestionar alumnos".
			</p>
	
    <div class="form-pago">
        <input type="number" id="alumnoId" placeholder="ID Alumno">
		<select id="cursoId">
		    <option value="">Seleccionar curso</option>
		</select>
        <input type="number" id="importe" placeholder="Importe (€)">

        <select id="metodo">
            <option value="Tarjeta">Tarjeta</option>
            <option value="Efectivo">Efectivo</option>
            <option value="Transferencia">Transferencia</option>
        </select>

        <input type="text" id="nota" placeholder="Nota (opcional)">

        <button onclick="crearPago()">Guardar pago</button>
    </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
